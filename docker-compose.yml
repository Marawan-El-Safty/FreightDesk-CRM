version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: freightdesk_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: freightdesk_crm
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_min_32_chars_long}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_min_32}
      JWT_REFRESH_EXPIRES_IN: 7d
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 10485760
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      COMPANY_NAME: FreightDesk
      COMPANY_LOGO: ${COMPANY_LOGO:-https://www.freightdesk.demo/SubmarkLogo.png}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-sales@freightdesk.demo}
      COMPANY_PHONE: ${COMPANY_PHONE:-+1 (555) 010-2030}
      COMPANY_ADDRESS: ${COMPANY_ADDRESS:-42 Harbor Business District, Demo City, DC 10001}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  uploads_data:
